services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: visioncart
      POSTGRES_USER: visioncart
      POSTGRES_PASSWORD: visioncart
    ports:
      - "5432:5432"
    volumes:
      - visioncart_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visioncart -d visioncart"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: visioncart
      MINIO_ROOT_PASSWORD: visioncart-local-only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - visioncart_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  visioncart_postgres:
  visioncart_minio:
