buildscript {
  repositories {
    google()
    mavenCentral()
  }
}

apply plugin: "com.android.library"
apply plugin: "com.facebook.react"

android {
  namespace "com.visioncart.tryon"
  compileSdk rootProject.ext.has("compileSdkVersion")
      ? rootProject.ext.get("compileSdkVersion")
      : 36

  defaultConfig {
    minSdk rootProject.ext.has("minSdkVersion")
        ? rootProject.ext.get("minSdkVersion")
        : 24
    targetSdk rootProject.ext.has("targetSdkVersion")
        ? rootProject.ext.get("targetSdkVersion")
        : 36
  }
}

react {
  libraryName = "RNVisionCartTryOnSpec"
  codegenJavaPackageName = "com.visioncart.tryon"
}

dependencies {
  implementation("com.facebook.react:react-android")

  def camerax_version = "1.3.4"
  implementation("androidx.camera:camera-core:${camerax_version}")
  implementation("androidx.camera:camera-camera2:${camerax_version}")
  implementation("androidx.camera:camera-lifecycle:${camerax_version}")
  implementation("androidx.camera:camera-view:${camerax_version}")

  implementation("com.google.mlkit:face-detection:16.1.7")
  implementation("androidx.appcompat:appcompat:1.7.0")
}
